<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudBrew — Specialty Coffee</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a0a00;
      color: #f5e6d0;
      min-height: 100vh;
    }

    header {
      background: #3d1a00;
      padding: 1.5rem 2rem;
      border-bottom: 2px solid #8b4513;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    header h1 { font-size: 1.8rem; color: #d4a96a; }
    header p { color: #b07040; }

    main {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .card {
      background: #2d1500;
      border: 1px solid #5c3010;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      color: #d4a96a;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .form-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    input {
      background: #1a0a00;
      border: 1px solid #5c3010;
      color: #f5e6d0;
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      flex: 1;
      min-width: 180px;
      font-size: 0.95rem;
    }

    input::placeholder { color: #7a5030; }

    input:focus {
      outline: none;
      border-color: #a0622d;
    }

    button {
      background: #8b4513;
      color: #f5e6d0;
      border: none;
      padding: 0.5rem 1.25rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    button:hover { background: #a0522d; }
    button:active { background: #6b3510; }

    #coffee-list {
      list-style: none;
    }

    #coffee-list li {
      padding: 0.75rem 0.25rem;
      border-bottom: 1px solid #3d1a00;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #coffee-list li:last-child { border-bottom: none; }
    #coffee-list li.empty { color: #7a5030; font-style: italic; }

    .coffee-name { font-weight: 500; }
    .coffee-origin { color: #b07040; font-size: 0.9rem; }

    .source-badge {
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      background: #3d2010;
      color: #d4a96a;
      font-weight: normal;
      border: 1px solid #5c3010;
    }

    .status-bar {
      padding: 0.6rem 0.75rem;
      border-radius: 4px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .status-bar.ok {
      background: #1a3a1a;
      color: #6fbf6f;
      border: 1px solid #2d6a2d;
    }

    .status-bar.error {
      background: #3a1a1a;
      color: #e07070;
      border: 1px solid #6a2d2d;
    }

    .loading { color: #7a5030; font-style: italic; }
  </style>
</head>
<body>

  <header>
    <h1>CloudBrew</h1>
    <p>Specialty Coffee Subscriptions</p>
  </header>

  <main>

    <div class="card">
      <h2>Add a Coffee</h2>
      <div class="form-row">
        <input
          id="name"
          type="text"
          placeholder="Coffee name (e.g. Ethiopian Yirgacheffe)"
          autocomplete="off"
        />
        <input
          id="origin"
          type="text"
          placeholder="Origin (e.g. Ethiopia)"
          autocomplete="off"
        />
      </div>
      <button onclick="addCoffee()">Add to Catalog</button>
    </div>

    <div class="card">
      <h2>
        Coffee Catalog
        <span id="source-badge" class="source-badge" style="display:none"></span>
      </h2>
      <div id="status-bar" class="status-bar"></div>
      <ul id="coffee-list">
        <li class="loading">Loading...</li>
      </ul>
    </div>

  </main>

  <script>
    // The frontend fetches from the backend on localhost:3000.
    // In a real production setup, this would be an environment variable
    // injected at build time or served via an API gateway.
    const API_BASE = 'http://localhost:3000';

    function showStatus(message, type) {
      const bar = document.getElementById('status-bar');
      bar.textContent = message;
      bar.className = `status-bar ${type}`;
      bar.style.display = 'block';
    }

    function hideStatus() {
      document.getElementById('status-bar').style.display = 'none';
    }

    async function loadCoffees() {
      try {
        const res = await fetch(`${API_BASE}/api/coffees`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        // Show cache/database badge
        const badge = document.getElementById('source-badge');
        badge.textContent = data.source === 'cache' ? 'Cached' : 'Live from DB';
        badge.style.display = 'inline';

        hideStatus();

        const list = document.getElementById('coffee-list');
        if (!data.data || data.data.length === 0) {
          list.innerHTML = '<li class="empty">No coffees yet. Add one above!</li>';
        } else {
          list.innerHTML = data.data.map(c => `
            <li>
              <span class="coffee-name">${escapeHtml(c.name)}</span>
              <span class="coffee-origin">${c.origin ? escapeHtml(c.origin) : '—'}</span>
            </li>
          `).join('');
        }
      } catch (err) {
        showStatus(
          `Cannot reach backend at ${API_BASE}. Is Docker Compose running? Error: ${err.message}`,
          'error'
        );
        document.getElementById('coffee-list').innerHTML =
          '<li class="empty">Could not load data.</li>';
        document.getElementById('source-badge').style.display = 'none';
      }
    }

    async function addCoffee() {
      const nameEl = document.getElementById('name');
      const originEl = document.getElementById('origin');
      const name = nameEl.value.trim();
      const origin = originEl.value.trim();

      if (!name) {
        showStatus('Please enter a coffee name.', 'error');
        nameEl.focus();
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/coffees`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, origin: origin || undefined })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        nameEl.value = '';
        originEl.value = '';
        await loadCoffees();
      } catch (err) {
        showStatus(`Failed to add coffee: ${err.message}`, 'error');
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Allow pressing Enter in the input fields to submit
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('origin').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addCoffee();
      });
      document.getElementById('name').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('origin').focus();
      });
      loadCoffees();
    });

    // Refresh every 15 seconds to show cache vs live data changes
    setInterval(loadCoffees, 15000);
  </script>

</body>
</html>
