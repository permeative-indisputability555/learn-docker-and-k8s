server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the single-page app — any path falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security: don't expose nginx version in error pages
    server_tokens off;

    # Basic cache headers for static assets
    location ~* \.(js|css|png|jpg|ico|svg)$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }
}
